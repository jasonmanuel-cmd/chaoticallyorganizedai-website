<!-- 2. STICKY CALL BUTTON - Always visible -->
<!-- ============================================ -->
<a href="tel:6616109198" id="stickyCallBtn" style="
    position:fixed;
    bottom:20px;
    right:20px;
    background:#00e676;
    color:#000;
    padding:15px 25px;
    border-radius:50px;
    text-decoration:none;
    font-weight:bold;
    box-shadow:0 4px 15px rgba(0,230,118,0.4);
    z-index:9999;
    display:flex;
    align-items:center;
    gap:10px;
    animation:pulse 2s infinite;
">
    📞 Call Now
</a>

<style>
@keyframes pulse {
    0%, 100% { transform:scale(1); }
    50% { transform:scale(1.05); }
}
@media (max-width:768px) {
    #stickyCallBtn { 
        bottom:80px; /* Above mobile CTA */
        padding:12px 20px;
        font-size:14px;
    }
}
</style>

<script>
// Track call button clicks
document.getElementById('stickyCallBtn').addEventListener('click', function() {
    if (typeof gtag !== 'undefined') {
        gtag('event', 'phone_call_click', {
            'location': 'sticky_button'
        });
    }
});
</script>

<!-- ============================================ -->
<!-- 3. SOCIAL PROOF NOTIFICATIONS -->
<!-- ============================================ -->
<div id="socialProof" style="
    position:fixed;
    bottom:80px;
    left:20px;
    background:#1a1a1a;
    border:1px solid #333;
    border-radius:8px;
    padding:15px;
    max-width:300px;
    z-index:9998;
    display:none;
    box-shadow:0 4px 20px rgba(0,0,0,0.5);
">
    <div style="display:flex; align-items:center; gap:12px;">
        <div style="width:40px; height:40px; background:#00e676; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:20px;">
            👤
        </div>
        <div>
            <p style="margin:0; color:#fff; font-size:13px; font-weight:bold;" id="spName">Mike from Bakersfield</p>
            <p style="margin:5px 0 0; color:#00e676; font-size:12px;" id="spAction">just requested an audit</p>
            <p style="margin:5px 0 0; color:#666; font-size:11px;" id="spTime">2 minutes ago</p>
        </div>
    </div>
</div>

<script>
// Fake social proof notifications (replace with real ones if you have them)
const notifications = [
    { name: "Mike from Bakersfield", action: "just requested an audit" },
    { name: "Sarah's HVAC", action: "just booked a call" },
    { name: "Dave's Plumbing", action: "downloaded the guide" },
    { name: "Kern County Electric", action: "just signed up" },
    { name: "Delano Roofing", action: "requested pricing" }
];

let currentNotif = 0;

function showSocialProof() {
    const notif = notifications[currentNotif];
    document.getElementById('spName').textContent = notif.name;
    document.getElementById('spAction').textContent = notif.action;
    document.getElementById('spTime').textContent = Math.floor(Math.random() * 10 + 1) + ' minutes ago';
    
    const sp = document.getElementById('socialProof');
    sp.style.display = 'block';
    sp.style.animation = 'slideIn 0.5s ease';
    
    setTimeout(function() {
        sp.style.display = 'none';
        currentNotif = (currentNotif + 1) % notifications.length;
    }, 5000);
}

// Show first notification after 10 seconds
setTimeout(showSocialProof, 10000);
// Then every 30 seconds
setInterval(showSocialProof, 30000);

// Add slideIn animation
const style = document.createElement('style');
style.textContent = `
    @keyframes slideIn {
        from { transform:translateX(-100%); opacity:0; }
        to { transform:translateX(0); opacity:1; }
    }
`;
document.head.appendChild(style);
</script>

<!-- 5. URGENCY BAR -->
<!-- ============================================ -->
<div id="urgencyBar" style="
    position:fixed;
    top:70px;
    left:0;
    width:100%;
    background:linear-gradient(90deg, #ff4444, #ff6b6b);
    color:#fff;
    text-align:center;
    padding:10px;
    z-index:9997;
    font-weight:bold;
    display:none;
">
    ⚡ Only <span id="spotsLeft">3</span> free audit spots left this week! 
    <a href="intake.html" style="color:#fff; text-decoration:underline;">Claim yours →</a>
</div>

<script>
// Show urgency bar after 5 seconds
setTimeout(function() {
    document.getElementById('urgencyBar').style.display = 'block';
}, 5000);

// Decrement spots every 2 minutes
setInterval(function() {
    const spots = document.getElementById('spotsLeft');
    let current = parseInt(spots.textContent);
    if (current > 1) {
        spots.textContent = current - 1;
    }
}, 120000);
</script>
