# Netlify Configuration for chaoticallyorganizedai.com
# ======================================================

[build]
  publish = "."
  # Runs package.json "build" script (no-op echo). Keeps Netlify happy if it expects a build step.
  command = "npm run build"

# SECURITY + PERFORMANCE HEADERS
[[headers]]
  for = "/*"
  [headers.values]
    # Security Headers
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    
    # Content Security Policy (Optimized for Web Performance & Security)
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://connect.facebook.net https://www.google.com https://www.gstatic.com https://translate.google.com https://translate.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://translate.googleapis.com; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://formspree.io https://www.google-analytics.com https://stats.g.doubleclick.net; frame-src 'self' https://www.facebook.com https://www.google.com"
    
    # SEO & Browser Control
    X-Robots-Tag = "index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1"
    X-DNS-Prefetch-Control = "on"
    Cache-Control = "public, max-age=0, must-revalidate"

# Cache static assets aggressively (Production Tuning)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Block common bot paths with 404
[[redirects]]
  from = "/wp-admin/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/wordpress/*"
  to = "/404.html"
  status = 404
  force = true

# REDIRECTS - HTTPS & WWW (Canonical Force)
[[redirects]]
  from = "http://chaoticallyorganizedai.com/*"
  to = "https://chaoticallyorganizedai.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.chaoticallyorganizedai.com/*"
  to = "https://chaoticallyorganizedai.com/:splat"
  status = 301
  force = true

# SHORT URL REDIRECTS
[[redirects]]
  from = "/audit"
  to = "/intake.html"
  status = 301

[[redirects]]
  from = "/quote"
  to = "/contact.html"
  status = 301

[[redirects]]
  from = "/careers"
  to = "/careers.html"
  status = 301

[[redirects]]
  from = "/support"
  to = "/support.html"
  status = 301

# Custom 404: Do NOT use /* -> /404.html here. Netlify serves /404.html automatically for
# unknown paths when the file exists in publish. A catch-all 404 redirect can break the
# homepage and all routes on some deploys. See: https://docs.netlify.com/routing/redirects/redirect-options/

# FORMS - Native Netlify Form Handling
[forms]
  filter = true

# Lighthouse plugin removed: static repo has no package.json; plugin can fail CI/deploy.
# Re-add after `npm init` + `npm i -D @netlify/plugin-lighthouse` if you want audits.
