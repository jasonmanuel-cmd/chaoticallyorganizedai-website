[build]
  publish = "."

# ---------------------------------------------------
# THE BOT KILLER CONFIGURATION
# ---------------------------------------------------

# 1. Block WordPress Admin Scans
# Bots looking for login pages to brute force.
[[redirects]]
  from = "*/wp-admin/*"
  to = "/404.html"
  status = 404
  force = true

# 2. Block WordPress Content Scanners
# Bots looking for plugin vulnerabilities.
[[redirects]]
  from = "*/wp-content/*"
  to = "/404.html"
  status = 404
  force = true

# 3. Block XML-RPC (The #1 Brute Force Attack)
# This file is the most attacked file on the internet.
[[redirects]]
  from = "*/xmlrpc.php"
  to = "/404.html"
  status = 404
  force = true

# 4. Block Generic PHP Files
# Your site is HTML. No one should be asking for PHP.
[[redirects]]
  from = "*.php"
  to = "/404.html"
  status = 404
  force = true

# 5. Security Headers (The Shield)
# Prevents people from framing your site or sniffing code.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"