# Custom 404
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

# FORMS - Ensure form submissions work
[forms]
  # Forms are handled by Formspree, no Netlify forms needed
  # This ensures any form submissions to Netlify are properly handled

# PLUGINS
[[plugins]]
  package = "@netlify/plugin-lighthouse"
  
  [plugins.inputs.audits]
    performance = true
    accessibility = true
    best-practices = true
    seo = true
    pwa = true
