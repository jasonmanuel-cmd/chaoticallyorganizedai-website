# Netlify Configuration for chaoticallyorganizedai.com
# ======================================================

[build]
  publish = "."
  command = ""

# SECURITY + PERFORMANCE HEADERS
[[headers]]
  for = "/*"
  [headers.values]
    # Security Headers
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    
    # Content Security Policy
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://connect.facebook.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://formspree.io https://www.google-analytics.com; frame-src 'self' https://www.facebook.com"
    
    # SEO Headers
    X-Robots-Tag = "index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1"
    
    # Performance
    X-DNS-Prefetch-Control = "on"
    Cache-Control = "public, max-age=0, must-revalidate"

# Cache static assets aggressively
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "*.png"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "*.webp"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "*.svg"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

# REDIRECTS - HTTPS & WWW
[[redirects]]
  from = "http://chaoticallyorganizedai.com/*"
  to = "https://chaoticallyorganizedai.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.chaoticallyorganizedai.com/*"
  to = "https://chaoticallyorganizedai.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.chaoticallyorganizedai.com/*"
  to = "https://chaoticallyorganizedai.com/:splat"
  status = 301
  force = true

